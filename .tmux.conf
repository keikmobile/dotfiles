# ~/.tmux.conf

# ───── prefix ─────
# デフォルトのCtrl+bからCtrl+aに変更（左手だけで完結する）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ───── 基本 ─────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"  # 真のトゥルーカラー対応
set -g base-index 1              # ウィンドウ番号を1始まりに
setw -g pane-base-index 1        # ペイン番号を1始まりに
set -g renumber-windows on       # ウィンドウを閉じたとき番号を詰める
set -g history-limit 50000       # スクロールバック履歴行数
set -g escape-time 0             # Escキーのディレイをなくす（vim使用時に重要）
set -g focus-events on           # フォーカスイベントを有効化（vim連携）

# ───── リロード ─────
# Prefix+r で設定ファイルを即時反映
bind r source-file ~/.tmux.conf \; display "Reloaded"

# ───── ウィンドウ・ペイン ─────
# 新規ウィンドウ・ペインは現在のパスを引き継ぐ
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"  # 縦分割
bind - split-window -v -c "#{pane_current_path}"  # 横分割
unbind '"'
unbind %

# ───── ペイン移動（vim） ─────
# hjklでペイン間を移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ───── ペインリサイズ（vim, repeat可） ─────
# HJKLでペインサイズを調整（-rで連続入力可能）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ───── マウス ─────
# スクロール・ペイン選択をマウスでも操作可能に
set -g mouse on

# ───── コピーモード（vi） ─────
# vimと同じキーバインドでテキスト選択・コピー
setw -g mode-keys vi
bind Enter copy-mode                                          # Enterでコピーモード開始
bind -T copy-mode-vi v send -X begin-selection               # vで選択開始
bind -T copy-mode-vi V send -X select-line                   # Vで行選択
bind -T copy-mode-vi C-v send -X rectangle-toggle            # Ctrl+vで矩形選択
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy" # yでクリップボードにコピー（Mac）
bind -T copy-mode-vi Escape send -X cancel                   # Escでキャンセル
bind -T copy-mode-vi H send -X start-of-line                 # Hで行頭
bind -T copy-mode-vi L send -X end-of-line                   # Lで行末

# ───── ステータスバー ─────
# Catppuccin Mochaベースのカラースキーム
set -g status-position top       # ステータスバーを上部に表示
set -g status-interval 5         # 5秒ごとに更新

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"  # セッション名

set -g status-right-length 60
set -g status-right "#[fg=#6c7086] %Y-%m-%d #[fg=#cdd6f4]%H:%M"  # 日付・時刻

setw -g window-status-format " #[fg=#6c7086]#I:#W "                        # 非アクティブウィンドウ
setw -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold] #I:#W " # アクティブウィンドウ

# ペインボーダーの色
set -g pane-border-style "fg=#313244"         # 非アクティブ
set -g pane-active-border-style "fg=#89b4fa"  # アクティブ

# ───── その他 ─────
set -g display-time 2000          # メッセージ表示時間（ms）
set -g display-panes-time 2000    # ペイン番号表示時間（ms）
setw -g automatic-rename on       # ウィンドウ名を実行コマンドに合わせて自動更新
set -g set-titles on              # ターミナルのタイトルバーも更新
set -g set-titles-string "#S / #W" # タイトル形式：セッション名 / ウィンドウ名
